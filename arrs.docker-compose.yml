  #     - 9117:9117
  #   restart: unless-stopped
  #   networks:
  #     - web

  # Movies manager
  # /torznab/all/api for jackett
  
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/<EXT-DRIVE>/docker-data/radarr_config:/config
      - /mnt/<EXT-DRIVE>:/srv/<EXT-DRIVE>
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      - web

  # Shows manager
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/<EXT-DRIVE>/docker-data/sonarr_config:/config
      - /mnt/<EXT-DRIVE>:/srv/<EXT-DRIVE>
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - web

  # Subtitles manager
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/<EXT-DRIVE>/docker-data/bazarr_config:/config
      - /mnt/<EXT-DRIVE>:/srv/<EXT-DRIVE>
    ports:
      - 6767:6767
    restart: unless-stopped
    networks:
      - web

