# mkdir /mnt/<EXT-DRIVE>
# chown <USER>:<USER> /mnt/<EXT-DRIVE>/downloads sudo mount /dev/sda2 /mnt/<EXT-DRIVE>
# Change <EXT-DRIVE> to your external drive name, and <USER> to your username

services:
  # Torrent Downloader
  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DELUGE_LOGLEVEL=error
    volumes:
      - /mnt/<EXT-DRIVE>/docker-data/deluge_config:/config
      - /mnt/<EXT-DRIVE>:/srv/<EXT-DRIVE>
    ports:
      - 8112:8112
      - 6881:6881
      - 6881:6881/udp
      - 58846:58846
    restart: unless-stopped
    networks:
      - web
      
  flaresolverr:
    # image: ghcr.io/flaresolverr/flaresolverr:latest
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Etc/UTC
    #dns:
    #  - 8.8.8.8
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks:
      - web


  # indexer for radarr, sonarr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/<EXT-DRIVE>/docker-data/prowlarr_config:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - web

  # Indexer
  # jackett:
  #   image: lscr.io/linuxserver/jackett:latest
  #   container_name: jackett
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=Etc/UTC
  #     # - RUN_OPTS=
  #     # - AUTO_UPDATE=true
  #   volumes:
  #     - ./jackett_config:/config
  #     - /mnt/<EXT-DRIVE>:/srv/<EXT-DRIVE>
