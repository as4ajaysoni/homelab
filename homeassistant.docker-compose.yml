services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host  # HA needs direct access : mDNS/ZeroConf, UPnP/SSDP, WS-Discovery (Windows IoT), Bluetooth/Zigbee
    environment:
      - TZ=Asia/Kolkata        # Change to your timezone
    volumes:
      - ha_config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro  # Enables Bluetooth support
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  ha_config:
    driver: local
