services:
  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - /mnt/DRIVE/downloads:/downloads      # Replace required path
    environment:
      - MAX_CONCURRENT_DOWNLOADS=3
      # - YTDL_OPTIONS={"writesubtitles": true}
