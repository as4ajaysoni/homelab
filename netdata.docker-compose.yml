services:
  netdata:
    image: netdata/netdata:v1.47.5 # Ensure not to pull latest as this one is Classic, loads instantly
    container_name: netdata
    pid: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    ports:
      - "19999:19999"
    volumes:
      - /mnt/<EXT-DRIVE>/portainer/netdata/config:/etc/netdata  # Replace <EXT-DRIVE> with mounted drive
      - /mnt/<EXT-DRIVE>/portainer/netdata/lib:/var/lib/netdata # Replace <EXT-DRIVE> with mounted drive
      - /mnt/<EXT-DRIVE>/portainer/netdata/cache:/var/cache/netdata # Replace <EXT-DRIVE> with mounted drive
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_DISABLE_CLOUD=1
      - DO_NOT_TRACK=1
    networks:
      - web

networks:
  web:
    name: web
